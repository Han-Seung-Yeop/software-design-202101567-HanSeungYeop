services:
  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      CLIENT_URL: http://localhost:8080
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped
